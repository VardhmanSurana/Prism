name: Prism CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install Root Dependencies
      run: |
        bun install

    - name: Install Backend Dependencies
      run: |
        cd backend
        uv sync --all-extras

    - name: Run Backend Tests
      run: |
        cd backend
        uv run pytest tests/ -q

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        bun install

    - name: Run Frontend Typecheck
      run: |
        cd frontend
        bunx tsc --noEmit

    - name: Build Frontend
      run: |
        cd frontend
        bun run build
