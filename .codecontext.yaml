project_root: .

parser:
  languages: [python, javascript, typescript, go, rust, java, cpp, c]
  exclude:
    - node_modules/
    - __pycache__/
    - vendor/
    - build/
    - .git/

storage:
  vector:
    type: chromadb
    path: .codecontext/chroma_db/
  graph:
    type: neo4j
    uri: bolt://localhost:7687
    username: neo4j
    password: vardhman

embedding:
  model: nomic-embed-text-v2-moe
  device: cuda

reranker:
  provider: jina
  api_key: ""

search:
  top_k: 10
  alpha: 0.5
  graph_expand_depth: 1
  rerank: true
